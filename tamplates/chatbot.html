<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medical Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-50:  #E6F1FB;
      --blue-100: #B5D4F4;
      --blue-200: #85B7EB;
      --blue-400: #378ADD;
      --blue-600: #185FA5;
      --blue-800: #0C447C;
      --blue-900: #042C53;
      --gray-50:  #F7F8FA;
      --gray-100: #ECEEF2;
      --gray-200: #D3D5DC;
      --gray-400: #888780;
      --gray-600: #5F5E5A;
      --gray-900: #1A1A1A;
      --green-50:  #EAF3DE;
      --green-600: #3B6D11;
      --amber-50:  #FAEEDA;
      --amber-600: #854F0B;
      --red-50:    #FCEBEB;
      --red-600:   #A32D2D;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--gray-50);
      height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    #header {
      background: linear-gradient(135deg, var(--blue-900) 0%, var(--blue-800) 60%, var(--blue-600) 100%);
      color: #fff; padding: 0 20px; height: 64px;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(4,44,83,0.18);
    }
    .logo-wrap {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #header-title { flex: 1; }
    #header-title h1 { font-size: 15px; font-weight: 600; color: #fff; }
    #header-title p  { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 1px; }
    #specialty-badge {
      display: none; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 500; color: #fff;
    }
    #specialty-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #6ee7b7; flex-shrink: 0; }

    #messages {
      flex: 1; overflow-y: auto; padding: 20px 16px 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; padding: 40px 20px;
    }
    .empty-icon {
      width: 64px; height: 64px; background: var(--blue-50);
      border: 1.5px solid var(--blue-100); border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .empty-state h2 { font-size: 17px; font-weight: 600; color: var(--gray-900); }
    .empty-state p  { font-size: 13px; color: var(--gray-400); text-align: center; line-height: 1.6; max-width: 260px; }

    .bubble {
      max-width: 78%; padding: 10px 14px; border-radius: 18px;
      font-size: 14px; line-height: 1.55; word-break: break-word; white-space: pre-wrap;
    }
    .bubble.user {
      background: var(--blue-600); color: #fff;
      align-self: flex-end; border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(24,95,165,0.25);
    }
    .bubble.bot {
      background: #fff; color: var(--gray-900);
      align-self: flex-start; border-bottom-left-radius: 4px;
      border: 0.5px solid var(--gray-100); box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .bubble.warning {
      background: #FFF8E1; color: #6D4C00;
      align-self: flex-start; border-bottom-left-radius: 4px;
      border: 1px solid #FFE082; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    /* ── no-availability notice ── */
    .bubble.no-avail {
      background: var(--red-50); color: var(--red-600);
      align-self: flex-start; border-bottom-left-radius: 4px;
      border: 1px solid #F7C1C1; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .bubble.user img { max-width: 200px; border-radius: 10px; display: block; }

    .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--blue-200);
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    .section-label {
      align-self: flex-start; font-size: 11px; font-weight: 600; color: var(--blue-600);
      text-transform: uppercase; letter-spacing: 0.7px; padding: 0 4px; margin-bottom: -2px;
    }

    .doctor-card {
      align-self: flex-start; background: #fff;
      border: 0.5px solid var(--gray-100); border-left: 3px solid var(--blue-400);
      border-radius: 14px; border-top-left-radius: 0;
      padding: 13px 15px; max-width: 88%; font-size: 13px; line-height: 1.6;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .doc-rank  { font-size: 10px; font-weight: 600; color: var(--blue-400); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 5px; }
    .doc-name  { font-weight: 600; font-size: 14px; color: var(--gray-900); margin-bottom: 8px; }
    .doc-row   { display: flex; align-items: flex-start; gap: 7px; color: var(--gray-600); margin-bottom: 3px; font-size: 12.5px; }
    .doc-row .icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
    .stars     { color: #F59E0B; letter-spacing: 1px; font-size: 12px; }
    .rating-num { color: var(--gray-400); font-size: 12px; margin-left: 3px; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; margin-top: 8px;
    }
    .status-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
    .status-available   { background: var(--green-50); color: var(--green-600); border: 1px solid #C0DD97; }
    .status-available::before   { background: var(--green-600); }
    .status-vacation    { background: var(--amber-50); color: var(--amber-600); border: 1px solid #FAC775; }
    .status-vacation::before    { background: var(--amber-600); }
    .status-unavailable { background: var(--red-50); color: var(--red-600); border: 1px solid #F7C1C1; }
    .status-unavailable::before { background: var(--red-600); }
    .dist-badge {
      display: inline-block; margin-left: 8px;
      background: var(--blue-50); color: var(--blue-800); border: 1px solid var(--blue-100);
      padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500;
    }

    /* ── pending-intent banner ── */
    #pending-banner {
      display: none;
      align-items: center; gap: 8px;
      background: #EFF6FF; border: 1px solid var(--blue-100);
      border-radius: 10px; padding: 8px 12px; margin-bottom: 8px;
      font-size: 12px; color: var(--blue-800);
    }
    #pending-banner .pend-icon { font-size: 15px; flex-shrink: 0; }
    #pending-banner span { flex: 1; }
    #pending-banner button {
      background: none; border: none; cursor: pointer;
      color: var(--gray-400); font-size: 16px; line-height: 1; padding: 0;
    }
    #pending-banner button:hover { color: var(--red-600); }

    #input-bar {
      background: #fff; border-top: 0.5px solid var(--gray-100);
      padding: 10px 14px 16px; flex-shrink: 0;
    }
    #location-chip {
      display: none; align-items: center; gap: 6px;
      background: var(--blue-50); border: 1px solid var(--blue-100);
      border-radius: 999px; padding: 4px 10px;
      font-size: 12px; color: var(--blue-800); margin-bottom: 8px; width: fit-content; font-weight: 500;
    }
    #location-chip button {
      background: none; border: none; cursor: pointer;
      color: var(--blue-400); font-size: 15px; line-height: 1; padding: 0 0 0 2px; font-weight: 600;
    }
    #location-chip button:hover { color: var(--red-600); }

    #image-preview-wrap {
      display: none; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    #image-preview-wrap img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; border: 1.5px solid var(--blue-100); }
    #image-preview-wrap span { font-size: 12px; color: var(--gray-600); flex: 1; }
    #image-preview-wrap button { background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: 18px; line-height: 1; }
    #image-preview-wrap button:hover { color: var(--red-600); }

    #input-row { display: flex; gap: 8px; align-items: center; }
    #msg-input {
      flex: 1; padding: 11px 16px; border-radius: 999px;
      border: 1.5px solid var(--gray-100); background: var(--gray-50);
      font-size: 14px; outline: none; color: var(--gray-900); font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    #msg-input:focus { border-color: var(--blue-200); background: #fff; }
    #msg-input::placeholder { color: var(--gray-400); }

    .icon-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s;
    }
    #send-btn     { background: var(--blue-600); box-shadow: 0 2px 8px rgba(24,95,165,0.3); }
    #send-btn:hover { background: var(--blue-800); transform: scale(1.06); }
    #location-btn { background: var(--blue-50); border: 1.5px solid var(--blue-100); }
    #location-btn:hover { background: var(--blue-100); transform: scale(1.06); }
    #location-btn.pulse {
      animation: pulse-ring 1s ease-in-out 3;
      border-color: var(--blue-400); background: var(--blue-100);
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(55,138,221,0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(55,138,221,0); }
      100% { box-shadow: 0 0 0 0 rgba(55,138,221,0); }
    }
    #image-btn { background: var(--gray-100); border: 1.5px solid var(--gray-200); }
    #image-btn:hover { background: var(--gray-200); transform: scale(1.06); }
    #hint { text-align: center; font-size: 11px; color: var(--gray-400); margin-top: 7px; }
  </style>
</head>
<body>

<div id="header">
  <div class="logo-wrap">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C8.686 2 6 4.686 6 8c0 2.188.994 4.129 2.556 5.4L8 22l4-2 4 2-.556-8.6C16.006 12.129 17 10.188 17 8c0-3.314-2.686-6-6-6z" fill="rgba(255,255,255,0.9)"/>
      <rect x="10" y="6" width="1.5" height="4" rx="0.75" fill="#185FA5"/>
      <rect x="8.5" y="7.5" width="4" height="1.5" rx="0.75" fill="#185FA5"/>
    </svg>
  </div>
  <div id="header-title">
    <h1>Medical Assistant</h1>
    <p>AI-powered doctor finder</p>
  </div>
  <div id="specialty-badge">
    <span class="dot"></span>
    <span id="specialty-text"></span>
  </div>
</div>

<div id="messages">
  <div class="empty-state" id="empty">
    <div class="empty-icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C8.686 2 6 4.686 6 8c0 2.188.994 4.129 2.556 5.4L8 22l4-2 4 2-.556-8.6C16.006 12.129 17 10.188 17 8c0-3.314-2.686-6-6-6z" fill="#378ADD"/>
        <rect x="10.5" y="6" width="1.5" height="4" rx="0.75" fill="white"/>
        <rect x="9" y="7.5" width="4" height="1.5" rx="0.75" fill="white"/>
      </svg>
    </div>
    <h2>How can I help you?</h2>
    <p>Describe your symptoms and I'll find the right specialist for you.</p>
  </div>
</div>

<div id="input-bar">
  <!-- ── Pending intent banner ── -->
  <div id="pending-banner">
    <span class="pend-icon">🕐</span>
    <span id="pending-text"></span>
    <button onclick="clearPendingIntent()" title="Cancel">&#215;</button>
  </div>

  <div id="location-chip">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#185FA5"/>
    </svg>
    <span id="location-text">Location set</span>
    <button onclick="clearLocation()" title="Remove">&#215;</button>
  </div>

  <div id="image-preview-wrap">
    <img id="image-preview" src="" alt="preview"/>
    <span id="image-preview-name"></span>
    <button onclick="clearImagePreview()" title="Remove image">&#215;</button>
  </div>

  <div id="input-row">
    <input id="msg-input" type="text" placeholder="Describe your symptoms..." />
    <button class="icon-btn" id="send-btn" title="Send">
      <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
        <path d="M3 9H15M15 9L9 3M15 9L9 15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="icon-btn" id="location-btn" title="Select location">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#185FA5"/>
        <circle cx="12" cy="9" r="2.5" fill="white"/>
      </svg>
    </button>
    <input type="file" id="image-input" accept="image/*" hidden>
    <button class="icon-btn" id="image-btn" title="Upload image">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
        <path d="M21 15V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V15" stroke="#5F5E5A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7 10L12 5L17 10" stroke="#5F5E5A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 5V15" stroke="#5F5E5A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <p id="hint">Enter to send &middot; Shift+Enter for new line</p>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  STORAGE KEYS
// ═══════════════════════════════════════════════════════
const KEY_MESSAGES      = 'chat_messages';
const KEY_SPECIALTY     = 'chat_specialty';
const KEY_MAP_LOC       = 'selectedLocation';
const KEY_USER_LOC      = 'userLocation';
const KEY_PENDING       = 'chat_pending_intent';   // ← NEW

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let rememberedSpecialty = null;
let userLat = null, userLon = null;
let pendingImageB64 = null, pendingImageMime = null;
let messageLog = [];

/*  pendingIntent — saved when the user asked for "nearest" but had no location.
    Shape: { db_intent: 'nearest', specialty: 'Dentiste' }
    Cleared after it is fulfilled or cancelled.                              */
let pendingIntent = null;

// ═══════════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════════
const messagesEl     = document.getElementById('messages');
const input          = document.getElementById('msg-input');
const empty          = document.getElementById('empty');
const specialtyBadge = document.getElementById('specialty-badge');
const specialtyTxt   = document.getElementById('specialty-text');
const locationChip   = document.getElementById('location-chip');
const locationTxt    = document.getElementById('location-text');
const locationBtn    = document.getElementById('location-btn');
const pendingBanner  = document.getElementById('pending-banner');
const pendingTxt     = document.getElementById('pending-text');

// ═══════════════════════════════════════════════════════
//  PERSIST
// ═══════════════════════════════════════════════════════
function saveSession() {
  try {
    localStorage.setItem(KEY_MESSAGES,  JSON.stringify(messageLog.filter(e => e.type !== 'image')));
    localStorage.setItem(KEY_SPECIALTY, rememberedSpecialty || '');
    localStorage.setItem(KEY_PENDING,   pendingIntent ? JSON.stringify(pendingIntent) : '');
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
//  PENDING INTENT
// ═══════════════════════════════════════════════════════
function setPendingIntent(intent) {
  pendingIntent = intent;
  const labels = { nearest: 'Find nearest doctor', rating: 'Find highest rated', availability: 'Find available now' };
  pendingTxt.textContent = '⏳ Waiting for location to: ' + (labels[intent.db_intent] || intent.db_intent);
  pendingBanner.style.display = 'flex';
  saveSession();
}

function clearPendingIntent() {
  pendingIntent = null;
  pendingBanner.style.display = 'none';
  saveSession();
}

// ═══════════════════════════════════════════════════════
//  LOCATION
// ═══════════════════════════════════════════════════════
function setLocation(lat, lon) {
  userLat = lat; userLon = lon;
  locationChip.style.display = 'flex';
  locationTxt.textContent = 'Lat: ' + lat.toFixed(4) + '  Lon: ' + lon.toFixed(4);
  locationBtn.classList.remove('pulse');
  localStorage.setItem(KEY_USER_LOC, JSON.stringify({ lat, lon }));

  // ── AUTO-FULFIL pending intent as soon as location is set ──
  if (pendingIntent) {
    const intent = pendingIntent;
    clearPendingIntent();
    // Small delay so location chip renders first
    setTimeout(() => executePendingIntent(intent, lat, lon), 300);
  }
}

function clearLocation() {
  userLat = userLon = null;
  locationChip.style.display = 'none';
  localStorage.removeItem(KEY_USER_LOC);
}

// ─── Execute stored intent directly against the backend ───────────────────
async function executePendingIntent(intent, lat, lon) {
  // Show a system message so the user knows what's happening
  addText('📍 Location received! Finding the ' + intent.db_intent + ' ' + intent.specialty + ' doctor for you...', 'bot');
  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: '',             // backend uses stored intent directly
        lat: lat,
        lon: lon,
        remembered_specialty: intent.specialty,
        force_db_intent: intent.db_intent,   // ← tell backend to skip LLM
      })
    });
    const data = await res.json();
    removeTyping();

    if (data.response) addText(data.response, 'bot');

    // ── FIX 1: No availability ──
    if (data.no_doctors_available) {
      addText('⚠️ No doctors are currently available for ' + intent.specialty + '. Please try again later or search by rating instead.', 'bot', false, true);
    } else if (data.doctors && data.doctors.length > 0) {
      addDoctors(data.doctors, data.db_intent || intent.db_intent);
    }
  } catch(err) {
    removeTyping();
    addText('Connection error while fetching doctors.', 'bot');
  }
}

// ═══════════════════════════════════════════════════════
//  DOM ELEMENT BUILDERS
// ═══════════════════════════════════════════════════════
function hideEmpty() { if (empty) empty.style.display = 'none'; }

function makeBubble(text, sender, isWarning, isNoAvail) {
  const d = document.createElement('div');
  if (isNoAvail)       d.className = 'bubble no-avail';
  else if (isWarning)  d.className = 'bubble warning';
  else                 d.className = 'bubble ' + sender;
  d.textContent = text;
  return d;
}

function makeImageBubble(src) {
  const d = document.createElement('div');
  d.className = 'bubble user';
  const img = document.createElement('img'); img.src = src;
  d.appendChild(img); return d;
}

function makeSectionLabel(text) {
  const d = document.createElement('div');
  d.className = 'section-label'; d.textContent = text; return d;
}

function makeDoctorCard(doc, rank) {
  const card = document.createElement('div');
  card.className = 'doctor-card';
  const stars = '\u2605'.repeat(Math.round(doc.rating)) + '\u2606'.repeat(5 - Math.round(doc.rating));
  let sc = 'status-unavailable';
  if (doc.status === 'Available now')    sc = 'status-available';
  else if (doc.status === 'On vacation') sc = 'status-vacation';
  const distHTML = doc.distance_km !== undefined
    ? '<span class="dist-badge">' + doc.distance_km + ' km</span>' : '';
  card.innerHTML =
    '<div class="doc-rank">#' + (rank+1) + ' &middot; ' + doc.specialty + '</div>' +
    '<div class="doc-name">' + doc.name + '</div>' +
    '<div class="doc-row"><span class="icon">&#11088;</span>' +
      '<span class="stars">' + stars + '</span>' +
      '<span class="rating-num">(' + doc.rating + '/5)</span>' + distHTML + '</div>' +
    '<div class="doc-row"><span class="icon">&#128205;</span><span>' + doc.address + '</span></div>' +
    '<div class="doc-row"><span class="icon">&#128222;</span><span>' + doc.phone + '</span></div>' +
    '<div class="doc-row"><span class="icon">&#128336;</span><span>' + doc.hours + ' &middot; ' + doc.days + '</span></div>' +
    '<span class="status-badge ' + sc + '">' + doc.status + '</span>';
  return card;
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function renderEntry(entry) {
  hideEmpty();
  if (entry.type === 'text') {
    messagesEl.appendChild(makeBubble(entry.text, entry.sender, entry.isWarning || false, entry.isNoAvail || false));
  } else if (entry.type === 'image') {
    messagesEl.appendChild(makeImageBubble(entry.src));
  } else if (entry.type === 'doctors') {
    messagesEl.appendChild(makeSectionLabel(entry.label));
    entry.doctors.forEach((doc, i) => messagesEl.appendChild(makeDoctorCard(doc, i)));
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addText(text, sender, isWarning = false, isNoAvail = false) {
  const entry = { type:'text', text, sender, isWarning, isNoAvail };
  messageLog.push(entry);
  saveSession();
  renderEntry(entry);
}

function addImageMsg(src) { renderEntry({ type:'image', src }); }

function addDoctors(doctors, dbIntent) {
  const labels = { nearest:'Nearest doctors', rating:'Highest rated doctors', availability:'Available doctors' };
  const label = labels[dbIntent] || 'Recommended doctors';
  const entry = { type:'doctors', label, doctors };
  messageLog.push(entry);
  saveSession();
  renderEntry(entry);
}

// ═══════════════════════════════════════════════════════
//  TYPING
// ═══════════════════════════════════════════════════════
function showTyping() {
  const d = document.createElement('div');
  d.className = 'bubble bot typing'; d.id = 'typing-indicator';
  d.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  messagesEl.appendChild(d); messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing-indicator'); if (t) t.remove(); }

// ═══════════════════════════════════════════════════════
//  IMAGE PREVIEW
// ═══════════════════════════════════════════════════════
function clearImagePreview() {
  pendingImageB64 = pendingImageMime = null;
  document.getElementById('image-preview-wrap').style.display = 'none';
  document.getElementById('image-preview').src = '';
  document.getElementById('image-preview-name').textContent = '';
  document.getElementById('image-input').value = '';
}

// ═══════════════════════════════════════════════════════
//  SEND MESSAGE
// ═══════════════════════════════════════════════════════
async function sendMessage(text) {
  if (!text && !pendingImageB64) return;

  if (pendingImageB64) addImageMsg('data:' + pendingImageMime + ';base64,' + pendingImageB64);
  if (text) addText(text, 'user');
  input.value = '';
  showTyping();

  const payload = {
    message: text,
    lat: userLat, lon: userLon,
    remembered_specialty: rememberedSpecialty,
  };
  if (pendingImageB64) { payload.image_b64 = pendingImageB64; payload.image_mime = pendingImageMime; }
  clearImagePreview();

  try {
    const res  = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await res.json();
    removeTyping();

    // ── Needs location ──
    if (data.needs_location) {
      addText(data.response, 'bot', true);
      // Save pending intent so it auto-runs after location is set
      if (data.pending_intent) setPendingIntent(data.pending_intent);
      // Pulse location button
      locationBtn.classList.remove('pulse');
      void locationBtn.offsetWidth;
      locationBtn.classList.add('pulse');
      locationBtn.addEventListener('animationend', () => locationBtn.classList.remove('pulse'), { once: true });
      return;
    }

    if (data.response) addText(data.response, 'bot');

    if (data.specialty && data.specialty !== rememberedSpecialty) {
      rememberedSpecialty = data.specialty;
      specialtyTxt.textContent = data.specialty;
      specialtyBadge.style.display = 'flex';
      saveSession();
    }

    // ── FIX 1: No availability ──
    if (data.no_doctors_available) {
      addText('⚠️ No ' + (rememberedSpecialty || '') + ' doctors are currently available. Try searching by rating instead.', 'bot', false, true);
    } else if (data.doctors && data.doctors.length > 0) {
      addDoctors(data.doctors, data.db_intent);
    }

  } catch (err) {
    removeTyping();
    addText('Connection error. Make sure the Flask server is running.', 'bot');
  }
}

// ═══════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════
document.getElementById('send-btn').addEventListener('click', () => sendMessage(input.value.trim()));
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input.value.trim()); }
});

document.getElementById('location-btn').addEventListener('click', () => {
  saveSession();
  window.location.href = '/location';
});

document.getElementById('image-btn').addEventListener('click', () => document.getElementById('image-input').click());
document.getElementById('image-input').addEventListener('change', () => {
  const file = document.getElementById('image-input').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const [header, b64] = e.target.result.split(',');
    pendingImageB64  = b64;
    pendingImageMime = header.match(/:(.*?);/)[1];
    document.getElementById('image-preview').src = e.target.result;
    document.getElementById('image-preview-name').textContent = file.name;
    document.getElementById('image-preview-wrap').style.display = 'flex';
  };
  reader.readAsDataURL(file);
  document.getElementById('image-input').value = '';
});


//  INIT

(function init() {
  // 1. Specialty
  const sp = localStorage.getItem(KEY_SPECIALTY);
  if (sp) { rememberedSpecialty = sp; specialtyTxt.textContent = sp; specialtyBadge.style.display = 'flex'; }

  // 2. Messages
  try {
    const raw = localStorage.getItem(KEY_MESSAGES);
    if (raw) { messageLog = JSON.parse(raw); messageLog.forEach(renderEntry); }
  } catch(e) { messageLog = []; }

  // 3. Pending intent (restored after navigation)
  try {
    const rawP = localStorage.getItem(KEY_PENDING);
    if (rawP) {
      pendingIntent = JSON.parse(rawP);
      const labels = { nearest: 'Find nearest doctor', rating: 'Find highest rated', availability: 'Find available now' };
      pendingTxt.textContent = '⏳ Waiting for location to: ' + (labels[pendingIntent.db_intent] || pendingIntent.db_intent);
      pendingBanner.style.display = 'flex';
    }
  } catch(e) {}

  // 4. Location — priority: map handoff → persisted
  const fromMap = localStorage.getItem(KEY_MAP_LOC);
  if (fromMap) {
    const loc = JSON.parse(fromMap);
    localStorage.removeItem(KEY_MAP_LOC);
    setLocation(loc.lat, loc.lon);   // this triggers auto-fulfil if pendingIntent exists
  } else {
    const saved = localStorage.getItem(KEY_USER_LOC);
    if (saved) { const loc = JSON.parse(saved); setLocation(loc.lat, loc.lon); }
  }
})();
</script>
